<mat-toolbar class="navbar" color="primary">
  <button mat-icon-button (click)="menuToggle.emit()">
    <mat-icon>menu</mat-icon>
  </button>

  <span class="app-title">Smart Training Center</span>

  <span class="spacer"></span>

  <button mat-icon-button [matMenuTriggerFor]="notifMenu" matBadge="3" matBadgeColor="warn" matBadgeSize="small">
    <mat-icon>notifications</mat-icon>
  </button>
  <mat-menu #notifMenu="matMenu">
    <div class="notification-header">Notifications</div>
    <button mat-menu-item>
      <mat-icon>warning</mat-icon>
      <span>Alerte capteur</span>
    </button>
  </mat-menu>

  <button mat-icon-button [matMenuTriggerFor]="userMenu">
    <mat-icon>account_circle</mat-icon>
  </button>
  <mat-menu #userMenu="matMenu">
    <div class="user-info">
      <strong>{{ userEmail }}</strong>
      <small>{{ userRoles.join(', ') }}</small>
    </div>
    <mat-divider></mat-divider>
    <button mat-menu-item routerLink="/users/profile">
      <mat-icon>person</mat-icon>
      <span>Mon profil</span>
    </button>
    <button mat-menu-item (click)="onLogout()">
      <mat-icon>logout</mat-icon>
      <span>Deconnexion</span>
    </button>
  </mat-menu>
</mat-toolbar>
