version: '3.8'

services:
  # ──────────────────────────────────────
  # MySQL Database
  # ──────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: stc-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: stc_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ──────────────────────────────────────
  # Mosquitto MQTT Broker
  # ──────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: stc-mosquitto
    ports:
      - "1883:1883"   # MQTT — backend, ESP32 devices, Python simulator
      - "9001:9001"   # WebSocket — browser MQTT clients (optional)
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    restart: unless-stopped

  # ──────────────────────────────────────
  # Spring Boot Backend
  # ──────────────────────────────────────
  backend:
    build: ./smart-training-center-backend
    container_name: stc-backend
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      mosquitto:
        condition: service_started
    environment:
      # Change to "production" when real ESP32 hardware is connected
      SPRING_PROFILES_ACTIVE: simulator
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/stc_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      MQTT_BROKER_URL: tcp://mosquitto:1883
      MQTT_USERNAME: ""
      MQTT_PASSWORD: ""
    restart: unless-stopped

  # ──────────────────────────────────────
  # Angular Frontend (served via Nginx)
  # ──────────────────────────────────────
  frontend:
    build: ./smart-training-center-frontend
    container_name: stc-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mysql_data:
  mosquitto_data:
  mosquitto_log:
