# Smart Training Center 4.0 — Mosquitto MQTT Broker Configuration
# ================================================================

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type all

# MQTT listener (standard TCP — used by Spring Boot backend, ESP32 devices, Python simulator)
listener 1883
protocol mqtt

# WebSocket listener (optional — for browser-based MQTT clients)
listener 9001
protocol websockets

# Authentication
# For development/demo: allow anonymous connections
allow_anonymous true

# For production with real hardware, replace the above with:
# allow_anonymous false
# password_file /mosquitto/config/passwd
#
# Generate the password file with:
#   mosquitto_passwd -c /mosquitto/config/passwd stc-backend
#   mosquitto_passwd /mosquitto/config/passwd esp32-device
